<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signage TV - Indoor Media</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        .media-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-item.active {
            opacity: 1;
            z-index: 10;
        }

        .media-item img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .media-item video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .media-item iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Painel de configuração */
        #config-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: rgba(20, 20, 20, 0.98);
            color: #fff;
            padding: 30px;
            z-index: 9999;
            transition: right 0.3s ease;
            overflow-y: auto;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
        }

        #config-panel.open {
            right: 0;
        }

        #config-panel h2 {
            margin-bottom: 25px;
            color: #00d4ff;
            font-size: 24px;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 10px;
        }

        #config-panel label {
            display: block;
            margin-top: 20px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #config-panel input[type="text"],
        #config-panel input[type="number"] {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            font-size: 14px;
        }

        #config-panel input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        #config-panel button {
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        #config-panel button:hover {
            background: #00b8e6;
        }

        #config-panel button:active {
            transform: scale(0.98);
        }

        #config-panel .info {
            margin-top: 30px;
            padding: 15px;
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid #00d4ff;
            font-size: 12px;
            line-height: 1.6;
            color: #ccc;
        }

        /* Logo para abrir painel */
        #logo-trigger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9998;
            transition: all 0.3s;
            color: #00d4ff;
            font-size: 24px;
            font-weight: bold;
        }

        #logo-trigger:hover {
            background: rgba(0, 212, 255, 0.4);
            transform: scale(1.1);
        }

        /* Status indicator */
        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #00d4ff;
            border-radius: 20px;
            font-size: 12px;
            z-index: 9997;
            display: none;
        }

        #status.show {
            display: block;
        }
    </style>
</head>
<body>

<div id="container"></div>
<div id="status">Carregando...</div>
<div id="logo-trigger" title="Configurações (F10 ou 6 toques)">⚙️</div>

<div id="config-panel">
    <h2>⚙️ Configurações</h2>
    
    <label>URL do CSV (Google Sheets publicado)</label>
    <input type="text" id="csv-url" placeholder="https://docs.google.com/spreadsheets/...">
    
    <label>Duração Imagem (ms)</label>
    <input type="number" id="image-duration" value="10000">
    
    <label>Duração Vídeo MP4 (ms) - 0 = duração total do vídeo</label>
    <input type="number" id="video-duration" value="0">
    
    <label>Duração YouTube (ms)</label>
    <input type="number" id="youtube-duration" value="45000">
    
    <label>Atualizar Lista (ms)</label>
    <input type="number" id="refresh-interval" value="60000">
    
    <label>Fade (ms)</label>
    <input type="number" id="fade-duration" value="800">
    
    <button onclick="saveConfig()">💾 Salvar Configurações</button>
    
    <div class="info">
        <strong>📝 Formatos suportados:</strong><br>
        • Imagens: JPG, PNG, GIF, WEBP<br>
        • <strong>Vídeos: MP4, WEBM (com autoplay)</strong><br>
        • YouTube: https://youtu.be/VIDEO_ID<br>
        • Google Drive: links de visualização<br><br>
        <strong>💡 Dica:</strong> Para vídeos MP4, deixe a duração em 0 para tocar até o final.
    </div>
</div>

<script>
    // ═══════════════════════════════════════════════════════
    // CONFIG & STATE
    // ═══════════════════════════════════════════════════════
    let config = {
        csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQV4wEUWYV3BilpIpsM63UD5dFfnKxlmEOE30SiHDvPLX80ni-gHh91Ssq525gh_Rb_G732tKPoLEJi/pub?gid=0&single=true&output=csv',
        imageDuration: 10000,
        videoDuration: 0, // 0 = toca até o fim
        youtubeDuration: 45000,
        refreshInterval: 60000,
        fadeDuration: 800
    };

    let mediaList = [];
    let currentIndex = 0;
    let isPlaying = false;
    let currentTimeout = null;
    let currentVideoElement = null;

    // ═══════════════════════════════════════════════════════
    // LOAD CONFIG FROM LOCALSTORAGE
    // ═══════════════════════════════════════════════════════
    function loadConfig() {
        const saved = localStorage.getItem('signage-config');
        if (saved) {
            try {
                config = { ...config, ...JSON.parse(saved) };
            } catch (e) {
                console.error('Erro ao carregar config:', e);
            }
        }
        updateConfigUI();
    }

    function updateConfigUI() {
        document.getElementById('csv-url').value = config.csvUrl;
        document.getElementById('image-duration').value = config.imageDuration;
        document.getElementById('video-duration').value = config.videoDuration;
        document.getElementById('youtube-duration').value = config.youtubeDuration;
        document.getElementById('refresh-interval').value = config.refreshInterval;
        document.getElementById('fade-duration').value = config.fadeDuration;
        
        // Atualiza CSS da transição
        document.querySelectorAll('.media-item').forEach(el => {
            el.style.transition = `opacity ${config.fadeDuration}ms ease-in-out`;
        });
    }

    function saveConfig() {
        config.csvUrl = document.getElementById('csv-url').value;
        config.imageDuration = parseInt(document.getElementById('image-duration').value);
        config.videoDuration = parseInt(document.getElementById('video-duration').value);
        config.youtubeDuration = parseInt(document.getElementById('youtube-duration').value);
        config.refreshInterval = parseInt(document.getElementById('refresh-interval').value);
        config.fadeDuration = parseInt(document.getElementById('fade-duration').value);
        
        localStorage.setItem('signage-config', JSON.stringify(config));
        updateConfigUI();
        
        showStatus('✅ Configurações salvas!');
        closePanel();
        
        // Recarrega lista
        fetchMediaList();
    }

    // ═══════════════════════════════════════════════════════
    // PANEL TOGGLE
    // ═══════════════════════════════════════════════════════
    let tapCount = 0;
    let tapTimeout = null;

    document.getElementById('logo-trigger').addEventListener('click', () => {
        tapCount++;
        clearTimeout(tapTimeout);
        tapTimeout = setTimeout(() => { tapCount = 0; }, 1000);
        
        if (tapCount >= 6) {
            tapCount = 0;
            togglePanel();
        }
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'F10') {
            e.preventDefault();
            togglePanel();
        }
    });

    function togglePanel() {
        document.getElementById('config-panel').classList.toggle('open');
    }

    function closePanel() {
        document.getElementById('config-panel').classList.remove('open');
    }

    function showStatus(msg, duration = 3000) {
        const status = document.getElementById('status');
        status.textContent = msg;
        status.classList.add('show');
        setTimeout(() => status.classList.remove('show'), duration);
    }

    // ═══════════════════════════════════════════════════════
    // FETCH MEDIA LIST FROM CSV
    // ═══════════════════════════════════════════════════════
    async function fetchMediaList() {
        try {
            showStatus('🔄 Atualizando lista...');
            const response = await fetch(config.csvUrl + '&_=' + Date.now());
            const text = await response.text();
            
            const lines = text.trim().split('\n');
            if (lines.length < 2) {
                console.error('CSV vazio');
                return;
            }
            
            // Detecta coluna (url, imagem, img, foto, link)
            const header = lines[0].toLowerCase();
            const columns = header.split(',').map(c => c.trim());
            let urlIndex = columns.findIndex(c => 
                c.includes('url') || c.includes('imagem') || 
                c.includes('img') || c.includes('foto') || c.includes('link')
            );
            
            if (urlIndex === -1) urlIndex = 0;
            
            const newList = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                const url = cols[urlIndex]?.trim();
                if (url && url.startsWith('http')) {
                    newList.push(url);
                }
            }
            
            if (newList.length > 0) {
                mediaList = newList;
                console.log('✅ Lista atualizada:', mediaList.length, 'itens');
                showStatus(`✅ ${mediaList.length} mídias carregadas`);
                
                if (!isPlaying) {
                    startPlayback();
                }
            }
        } catch (error) {
            console.error('Erro ao buscar CSV:', error);
            showStatus('❌ Erro ao carregar lista', 5000);
        }
    }

    // ═══════════════════════════════════════════════════════
    // DETECT MEDIA TYPE
    // ═══════════════════════════════════════════════════════
    function detectMediaType(url) {
        const lower = url.toLowerCase();
        
        // Vídeo MP4, WEBM, etc
        if (lower.match(/\.(mp4|webm|ogg|mov)(\?|$)/i)) {
            return 'video';
        }
        
        // YouTube
        if (lower.includes('youtu.be') || lower.includes('youtube.com')) {
            return 'youtube';
        }
        
        // Google Drive
        if (lower.includes('drive.google.com')) {
            return 'drive';
        }
        
        // Imagens
        if (lower.match(/\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?|$)/i)) {
            return 'image';
        }
        
        // Default: tenta imagem
        return 'image';
    }

    // ═══════════════════════════════════════════════════════
    // CREATE MEDIA ELEMENT
    // ═══════════════════════════════════════════════════════
    function createMediaElement(url, type) {
        const div = document.createElement('div');
        div.className = 'media-item';
        div.style.transition = `opacity ${config.fadeDuration}ms ease-in-out`;
        
        if (type === 'video') {
            const video = document.createElement('video');
            video.src = url;
            video.muted = true; // CRÍTICO para autoplay
            video.autoplay = true;
            video.playsInline = true;
            video.preload = 'auto';
            
            // Se duração for 0, toca até o fim
            if (config.videoDuration === 0) {
                video.loop = false;
                video.addEventListener('ended', () => {
                    console.log('✅ Vídeo terminou, próximo item');
                    nextMedia();
                });
            } else {
                video.loop = true;
            }
            
            // Força play quando ficar ativo
            video.addEventListener('canplay', () => {
                if (div.classList.contains('active')) {
                    video.play().catch(e => console.error('Erro ao dar play:', e));
                }
            });
            
            div.appendChild(video);
            currentVideoElement = video;
            
        } else if (type === 'youtube') {
            const videoId = extractYouTubeId(url);
            if (videoId) {
                const iframe = document.createElement('iframe');
                iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${videoId}&playsinline=1`;
                iframe.allow = 'autoplay; fullscreen';
                div.appendChild(iframe);
            }
            
        } else if (type === 'drive') {
            const driveUrl = convertDriveUrl(url);
            const img = document.createElement('img');
            img.src = driveUrl;
            img.alt = 'Drive Image';
            div.appendChild(img);
            
        } else {
            // Imagem normal
            const img = document.createElement('img');
            img.src = url;
            img.alt = 'Media';
            div.appendChild(img);
        }
        
        return div;
    }

    function extractYouTubeId(url) {
        const match = url.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&?\/]+)/);
        return match ? match[1] : null;
    }

    function convertDriveUrl(url) {
        const match = url.match(/\/d\/([^\/]+)/);
        if (match) {
            return `https://drive.google.com/uc?export=view&id=${match[1]}`;
        }
        return url;
    }

    // ═══════════════════════════════════════════════════════
    // PLAYBACK CONTROL
    // ═══════════════════════════════════════════════════════
    function startPlayback() {
        if (mediaList.length === 0) {
            console.log('Nenhuma mídia na lista');
            return;
        }
        
        isPlaying = true;
        currentIndex = 0;
        showMedia(currentIndex);
    }

    function showMedia(index) {
        if (index >= mediaList.length) index = 0;
        
        const url = mediaList[index];
        const type = detectMediaType(url);
        
        console.log(`▶️ [${index + 1}/${mediaList.length}] ${type.toUpperCase()}: ${url}`);
        
        // Remove itens antigos
        const container = document.getElementById('container');
        const oldItems = container.querySelectorAll('.media-item');
        oldItems.forEach(item => {
            item.classList.remove('active');
            // Remove vídeos antigos para liberar memória
            setTimeout(() => {
                if (!item.classList.contains('active')) {
                    item.remove();
                }
            }, config.fadeDuration);
        });
        
        // Cria novo elemento
        const newElement = createMediaElement(url, type);
        container.appendChild(newElement);
        
        // Ativa após um frame (para trigger da transição)
        setTimeout(() => {
            newElement.classList.add('active');
        }, 50);
        
        // Determina duração
        let duration = config.imageDuration;
        
        if (type === 'video') {
            duration = config.videoDuration;
            // Se duração 0, o evento 'ended' do vídeo chamará nextMedia()
            if (duration === 0) {
                return; // Não agenda próximo, aguarda vídeo terminar
            }
        } else if (type === 'youtube') {
            duration = config.youtubeDuration;
        }
        
        // Agenda próximo item
        clearTimeout(currentTimeout);
        currentTimeout = setTimeout(() => nextMedia(), duration);
    }

    function nextMedia() {
        currentIndex = (currentIndex + 1) % mediaList.length;
        showMedia(currentIndex);
    }

    // ═══════════════════════════════════════════════════════
    // AUTO REFRESH LIST
    // ═══════════════════════════════════════════════════════
    function startAutoRefresh() {
        setInterval(() => {
            fetchMediaList();
        }, config.refreshInterval);
    }

    // ═══════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════
    loadConfig();
    fetchMediaList();
    startAutoRefresh();
</script>

</body>
</html>
